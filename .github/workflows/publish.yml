# =============================================================================
# Publish to npm — @stakra/ts-container
# =============================================================================
#
# Triggered by:
#   - Pushing a tag matching v* (e.g. v2.0.0)
#   - Manual workflow_dispatch
#
# Required secrets:
#   - NPM_TOKEN — npm automation token with publish access
#
# Flow:
#   1. Typecheck
#   2. Build
#   3. Test
#   4. Publish to npm
#   5. Create GitHub Release with changelog notes
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: 🚀 Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔷 Type check
        run: pnpm typecheck

      - name: 🔨 Build
        run: pnpm build

      - name: 🧪 Run tests
        run: pnpm test

      - name: 🚀 Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🏷️ Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 📝 Extract changelog notes
        id: changelog
        run: |
          # Extract the top-most version block from CHANGELOG.md
          awk '/^## [0-9]/{if(found) exit; found=1; next} found{print}' CHANGELOG.md > release_notes.txt
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🎉 Create GitHub Release
        if: ${{ github.event.inputs.dry_run != 'true' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
